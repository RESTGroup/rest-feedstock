

package:
  name: "rest"
  version: "2025.02.7"

source:
  # - git: https://gitee.com/restgroup/rest.git
  - git: https://gitee.com/canarias/rest.git
    # rev: "208b61427787a5fb946a1a9b7bf9daa8dd0e4ab9"
    branch: no-mpi
    target_directory: rest
  #- git: https://gitee.com/restgroup/rest_tensors.git
  - git: https://gitee.com/canarias/rest_tensors.git
    #tag: v2025.02
    rev: fc053c890f0c7c2f4c27648fd8ac031f6f20fe76
    branch: for-win
    target_directory: rest_tensors
  - git: https://gitee.com/restgroup/rest_libcint.git
    #tag: v2025.01
    rev: "cba39d4ea645fa1e21de9060278d5de883a51658"
    target_directory: rest_libcint
  #- git: https://gitee.com/restgroup/rest_regression.git
  - git: https://gitee.com/canarias/rest_regression.git
    #tag: v2025.02
    # rev: "9d253e2a2d934eacd816e049fce84d4e4b9f6512"
    branch: win-invalid
    target_directory: rest_regression

build:
  number: 0
  files:
    exclude:
      - "**/__pycache__"
      - "**/test-files"
  script:
    env:
      REST_HOME: ${SRC_DIR}
      CONDA_BUILD_WINSDK: ${{ '${BUILD_PREFIX}/x86_64-w64-mingw32/sysroot' if target_platform == 'win-64' else '' }}

requirements:
  build:
    - if: win
      then: gcc_win-64
      else: ${{ compiler('c') }}
    - if: win
      then: gxx_win-64
      else: ${{ compiler('cxx') }}
    - if: win
      then: gfortran_win-64
      else: ${{ compiler('fortran') }}
    - if: win
      then: m2w64-sysroot_win-64
    - ${{ compiler('rust') }}
    - if: win
      then: rust-std-x86_64-pc-windows-gnu
    - if: win
      then: libclang
      else: libclang 21.*
    - hdf5
    - libcint
    - openblas * openmp*
    - python
    - libxc-c
    - if: not win
      then: openmpi 4.*
    - mokit
    - geometric
    - simple-dftd3
    - dftd4
    - if: linux
      then: sysroot_linux-64 ==2.17
    - if: osx
      then: llvm-openmp
  host:
    - hdf5
    - libcint
    - openblas * openmp*
    - python
    - libxc-c
    - if: not win
      then: openmpi 4.*
    - mokit
    - geometric
    - simple-dftd3
    - dftd4
    - if: osx
      then: llvm-openmp
  run:
    - hdf5
    - libcint
    - openblas * openmp*
    - python
    - libxc-c
    - if: not win
      then: openmpi 4.*
    - mokit
    - geometric
    - simple-dftd3
    - dftd4

tests:
  - script: run_tests.sh
    requirements:
      run:
        # - {{ compiler('rust') }}
        - restgroup::rest_regression
    files:
      source:
        - rest_regression

about:
  homepage: https://gitee.com/restgroup/rest
  summary: "Rust-based Electronic-Structure Toolkit (REST), aiming at an efficient computational platform for state-of-the-art DFT and WFT methods."
  description: |
    Rust-based Electronic-Structure Toolkit (REST), 
    aiming at an efficient computational platform for state-of-the-art DFT and WFT methods.
  license: GPL-2.0-only
#   # The license_family, i.e. "BSD" if license is "BSD-3-Clause".
#   # Optional
#   license_family: MIT
#   # It is required to include a license file in the package,
#   # (even if the license doesn't require it) using the license_file entry.
#   # Please also note that some projects have multiple license files which all need to be added using a valid yaml list.
#   # See https://docs.conda.io/projects/conda-build/en/latest/resources/define-metadata.html#license-file
#   license_file: LICENSE.txt
#   # The doc_url and dev_url are optional.
  documentation: https://rest-doc.readthedocs.io/en/index.html
#   dev_url: https://github.com/simplejson/simplejson

extra:
  recipe-maintainers:
    - jeanwsr
