

package:
  name: "rest"
  version: "2025.02.7"

source:
  #url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/{{ name }}-{{ version }}.tar.gz
  # If getting the source from GitHub, remove the line above,
  # uncomment the line below, and modify as needed. Use releases if available:
  # url: https://github.com/simplejson/simplejson/releases/download/{{ version }}/simplejson-{{ version }}.tar.gz
  # and otherwise fall back to archive:
  # url: https://https://gitee.com/canarias/rest/archive/v{{ version }}.tar.gz
  #sha256: 2b3a0c466fb4a1014ea131c2b8ea7c519f9278eba73d6fcb361b7bdb4fd494e9
  # sha256 is the preferred checksum -- you can get it for a file with:
  #  `openssl sha256 <file name>`.
  # You may need the openssl package, available on conda-forge:
  #  `conda install openssl -c conda-forge`
  - git: https://gitee.com/restgroup/rest_workspace.git
    tag: v2025.02
    # rev: master
  - git: https://gitee.com/restgroup/rest.git
  #- git: https://gitee.com/canarias/rest.git
    #tag: v2025.01
    rev: 5b48bbdb28ce657ab146357e2efe6858a9779b46
    #branch: support-mac
    target_directory: rest
  - git: https://gitee.com/restgroup/rest_tensors.git
  #- git: https://gitee.com/canarias/rest_tensors.git
    #tag: v2025.02
    rev: 0f6f10efd930b2d798e86bcce0b692102d3846d2
    #branch: cfg-libc-import
    target_directory: rest_tensors
  - git: https://gitee.com/restgroup/rest_libcint.git
    #tag: v2025.01
    rev: cba39d4ea645fa1e21de9060278d5de883a51658
    target_directory: rest_libcint
  - git: https://gitee.com/restgroup/rest_regression.git
    #tag: v2025.02
    rev: c0b1c81d344f58aad4aa56cd8ab4f03360d0e708
    target_directory: rest_regression

build:
  number: 0
  files:
    exclude:
      - "**/__pycache__"
      - "**/test-files"
  script:
    env:
      REST_HOME: ${SRC_DIR}
      # REST_DEPS: "${SRC_DIR}/rest_deps_placeholder_placeholder"
      REST_EXT_DIR: "${PREFIX}/lib"
      HDF5_DIR: "${BUILD_PREFIX}"
    content: |
      set -ex
      cd rest
      # mkdir -p ${REST_DEPS}
      # mkdir -p ${REST_DEPS}/lib
      if [[ "$target_platform" == osx-* ]]; then
        LIB_EXT="dylib"
      else
        LIB_EXT="so"
      fi
      # cp ${BUILD_PREFIX}/lib/*.${LIB_EXT} ${REST_EXT_DIR}/
      cp ${BUILD_PREFIX}/lib/python${PY_VER}/site-packages/mokit/lib/librest2fch.${LIB_EXT} ${REST_EXT_DIR}/
      export LIBCLANG_PATH="$BUILD_PREFIX/lib"
      cargo install --path . --profile release --root ${PREFIX}
      mkdir -p ${PREFIX}/share/rest/
      cp -r ./basis-set-pool ${PREFIX}/share/rest/
      # cp ${REST_EXT_DIR}/librestmatr.${LIB_EXT} ${PREFIX}/lib/
      # if [[ "$target_platform" == osx-* ]]; then
      #   install_name_tool -id "@rpath/librestmatr.dylib" ${PREFIX}/lib/librestmatr.dylib
      # fi
      # cp ${REST_EXT_DIR}/librest2fch.${LIB_EXT} ${PREFIX}/lib/
      # todo: remove the manual copy

requirements:
  build:
    - ${{ compiler('c') }}
    #- {{ stdlib('c') }}
    - ${{ compiler('cxx') }}
    - ${{ compiler('fortran') }}
    - ${{ compiler('rust') }}
    - libclang 21.*
    - hdf5
    - libcint
    - openblas * openmp*
    - python
    - libxc-c
    - openmpi 
    - mokit
    - geometric
    - simple-dftd3
    - dftd4
    - if: linux
      then: sysroot_linux-64 ==2.17
    - if: osx
      then: llvm-openmp
  host:
    - hdf5
    - libcint
    - openblas * openmp*
    - python
    - libxc-c
    - openmpi 
    - mokit
    - geometric
    - simple-dftd3
    - dftd4
    - if: osx
      then: llvm-openmp
  run:
    - hdf5
    - libcint
    - openblas * openmp*
    - python
    - libxc-c
    - openmpi 
    - mokit
    - geometric
    - simple-dftd3
    - dftd4

tests:
  - script: run_tests.sh
    requirements:
      run:
        # - {{ compiler('rust') }}
        - restgroup::rest_regression
    files:
      source:
        - rest_regression

about:
  homepage: https://gitee.com/restgroup/rest
  summary: "Rust-based Electronic-Structure Toolkit (REST), aiming at an efficient computational platform for state-of-the-art DFT and WFT methods."
  description: |
    Rust-based Electronic-Structure Toolkit (REST), 
    aiming at an efficient computational platform for state-of-the-art DFT and WFT methods.
  license: GPL-2.0-only
#   # The license_family, i.e. "BSD" if license is "BSD-3-Clause".
#   # Optional
#   license_family: MIT
#   # It is required to include a license file in the package,
#   # (even if the license doesn't require it) using the license_file entry.
#   # Please also note that some projects have multiple license files which all need to be added using a valid yaml list.
#   # See https://docs.conda.io/projects/conda-build/en/latest/resources/define-metadata.html#license-file
#   license_file: LICENSE.txt
#   # The doc_url and dev_url are optional.
  documentation: https://rest-doc.readthedocs.io/en/index.html
#   dev_url: https://github.com/simplejson/simplejson

extra:
